name: Deploy Trading Agent to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.EC2_SSH_KEY }}
          known_hosts: unnecessary # Will bypass host verification in following commands
          if_key_exists: replace

      - name: Deploy Files to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}${{ vars.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}${{ vars.EC2_USERNAME }}
        run: |
          rsync -avz -e "ssh -o StrictHostKeyChecking=no" --exclude='.git' --exclude='.github' --exclude='.venv' --exclude='logs' --exclude='data' ./ $EC2_USERNAME@$EC2_HOST:~/nse-agent/

      - name: Start Container Stack on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}${{ vars.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}${{ vars.EC2_USERNAME }}
        run: |
          ssh -o StrictHostKeyChecking=no $EC2_USERNAME@$EC2_HOST "mkdir -p ~/nse-agent/logs ~/nse-agent/data && cd ~/nse-agent && docker-compose down && docker-compose up -d --build"
