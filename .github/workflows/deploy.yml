name: Deploy Trading Agent to Hetzner

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.HETZNER_SSH_KEY }}
          known_hosts: unnecessary # Will bypass host verification in following commands
          if_key_exists: replace

      - name: Deploy Files to Hetzner
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USERNAME: ${{ secrets.HETZNER_USERNAME }}
        run: |
          rsync -avz -e "ssh -o StrictHostKeyChecking=no" --exclude='.git' --exclude='.github' --exclude='.venv' --exclude='logs' --exclude='data' ./ $HETZNER_USERNAME@$HETZNER_HOST:~/trading-agent/

      - name: Start Container Stack on Hetzner
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USERNAME: ${{ secrets.HETZNER_USERNAME }}
        run: |
          ssh -o StrictHostKeyChecking=no $HETZNER_USERNAME@$HETZNER_HOST "mkdir -p ~/trading-agent/logs ~/trading-agent/data && cd ~/trading-agent && docker compose kill && docker compose rm -f && docker compose up -d --build"
