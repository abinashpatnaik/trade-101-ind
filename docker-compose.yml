  # US Market Agent (Alpaca)
  agent-us:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: us-trading-agent
    environment:
      - TRADING_MARKET=US
      - APCA_API_KEY_ID=${APCA_API_KEY_ID}
      - APCA_API_SECRET_KEY=${APCA_API_SECRET_KEY}
      - TRADING_MODE=${TRADING_MODE:-paper}
      - EOD_API_KEY=${EOD_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AI_VALIDATION_ENABLED=${AI_VALIDATION_ENABLED:-false}
      - GMAIL_ADDRESS=${GMAIL_ADDRESS}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - REPORT_RECIPIENT=${REPORT_RECIPIENT}
      - TZ=America/New_York
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped

  # Web Dashboard
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: nse-dashboard
    ports:
      - "3001:3000"
    environment:
      - DASHBOARD_USERNAME=${DASHBOARD_USERNAME:-}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-}
      - TRADES_CSV_PATH=/data/trades_US.csv
      - AGENT_LOG_PATH=/logs/agent_US.log
      - MARKET_TYPE=US
    volumes:
      - ./logs:/logs
      - ./data:/data
    restart: unless-stopped
