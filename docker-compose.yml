version: '3.8'

# ---------------------------------------------------------------------------
# Multi-agent trading stack (see agents/__init__.py for the architecture).
# One shared image; each service runs one agent via `command:`.
# Trader container names (in-trading-agent / us-trading-agent) are preserved —
# dashboard/server.js health checks depend on them.
# ---------------------------------------------------------------------------

x-agent-base: &agent-base
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ./:/app
    - ./logs:/app/logs
    - ./data:/app/data
  restart: unless-stopped
  depends_on:
    redis:
      condition: service_healthy

services:

  redis:
    image: redis:7-alpine
    container_name: t101-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # =========================================================================
  # INDIA (NSE / Zerodha)
  # =========================================================================

  agent-in:
    <<: *agent-base
    container_name: in-trading-agent
    command: ["python", "-m", "agents.trader"]
    environment:
      - TRADING_MARKET=IN
      - REDIS_URL=redis://redis:6379/0
      - HC_AGENT=trader
      - KITE_API_KEY=${KITE_API_KEY}
      - KITE_API_SECRET=${KITE_API_SECRET}
      - KITE_USER_ID=${KITE_USER_ID}
      - KITE_PASSWORD=${KITE_PASSWORD}
      - KITE_TOTP_SECRET=${KITE_TOTP_SECRET}
      - TRADING_MODE=${TRADING_MODE:-paper}
      - EOD_API_KEY=${EOD_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AI_VALIDATION_ENABLED=${AI_VALIDATION_ENABLED:-true}
      - AI_PRIMARY_DRIVER=${AI_PRIMARY_DRIVER:-true}
      # Symbols the bot must never adopt/manage (empty = manage everything,
      # incl. delivery holdings — enabled once DDPI allowed trading them).
      - ZERODHA_IGNORE_HOLDINGS=${ZERODHA_IGNORE_HOLDINGS:-}
      - GMAIL_ADDRESS=${GMAIL_ADDRESS}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - REPORT_RECIPIENT=${REPORT_RECIPIENT}
      - TZ=Asia/Kolkata
      - DASHBOARD_HOST=dashboard-in
      - OBSERVE_ONLY=${OBSERVE_ONLY:-false}
      # IN flattens everything at the close: measured on 50 live round trips,
      # overnight holds lost 4x more per trade than same-day exits and two gap
      # exits were half the period's loss. US deliberately does NOT set this —
      # daily flattening would exhaust its PDT day-trade budget.
      - ALLOW_OVERNIGHT_HOLD=${IN_ALLOW_OVERNIGHT_HOLD:-false}
      # Churn cap. Live IN logs: one symbol entered 5x in a single day; a cap
      # of 2 would have blocked 22% of all BUYs. Expectancy is negative, so
      # each blocked re-entry saves its round-trip friction.
      - MAX_ENTRIES_PER_SYMBOL_PER_DAY=${IN_MAX_ENTRIES_PER_SYMBOL:-2}

  orchestrator-in:
    <<: *agent-base
    container_name: in-orchestrator
    command: ["python", "-m", "agents.orchestrator"]
    environment:
      - TRADING_MARKET=IN
      - REDIS_URL=redis://redis:6379/0
      - HC_AGENT=orchestrator
      - TZ=Asia/Kolkata
      - CONTAINER_TRADER=in-trading-agent
      - CONTAINER_SCANNER=in-scanner
      - CONTAINER_VETTING=in-vetting
      - CONTAINER_STRATEGY=in-strategy
      - CONTAINER_TRAINER=in-trainer
    volumes:
      - ./:/app
      - ./logs:/app/logs
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock

  scanner-in:
    <<: *agent-base
    container_name: in-scanner
    command: ["python", "-m", "agents.scanner"]
    environment:
      - TRADING_MARKET=IN
      - REDIS_URL=redis://redis:6379/0
      - HC_AGENT=scanner
      - EOD_API_KEY=${EOD_API_KEY}
      - TZ=Asia/Kolkata

  vetting-in:
    <<: *agent-base
    container_name: in-vetting
    command: ["python", "-m", "agents.vetting"]
    environment:
      - TRADING_MARKET=IN
      - REDIS_URL=redis://redis:6379/0
      - HC_AGENT=vetting
      - TZ=Asia/Kolkata
      # Match the live trader's entry path so the backtest screen tests the
      # ML-driven strategy that actually trades, not the classic trend path.
      - AI_VALIDATION_ENABLED=${AI_VALIDATION_ENABLED:-true}
      - AI_PRIMARY_DRIVER=${AI_PRIMARY_DRIVER:-true}

  strategy-in:
    <<: *agent-base
    container_name: in-strategy
    command: ["python", "-m", "agents.strategy"]
    environment:
      - TRADING_MARKET=IN
      - REDIS_URL=redis://redis:6379/0
      - HC_AGENT=strategy
      - TZ=Asia/Kolkata

  trainer-in:
    <<: *agent-base
    container_name: in-trainer
    command: ["python", "-m", "agents.trainer"]
    environment:
      - TRADING_MARKET=IN
      - REDIS_URL=redis://redis:6379/0
      - HC_AGENT=trainer
      - EOD_API_KEY=${EOD_API_KEY}
      - TZ=Asia/Kolkata

  # =========================================================================
  # US (NASDAQ / Alpaca)
  # =========================================================================

  agent-us:
    <<: *agent-base
    container_name: us-trading-agent
    command: ["python", "-m", "agents.trader"]
    environment:
      - TRADING_MARKET=US
      - REDIS_URL=redis://redis:6379/0
      - HC_AGENT=trader
      - APCA_API_KEY_ID=${APCA_API_KEY_ID}
      - APCA_API_SECRET_KEY=${APCA_API_SECRET_KEY}
      - TRADING_MODE=${TRADING_MODE:-paper}
      - EOD_API_KEY=${EOD_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AI_VALIDATION_ENABLED=${AI_VALIDATION_ENABLED:-true}
      - AI_PRIMARY_DRIVER=${AI_PRIMARY_DRIVER:-true}
      - GMAIL_ADDRESS=${GMAIL_ADDRESS}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - REPORT_RECIPIENT=${REPORT_RECIPIENT}
      - TZ=America/New_York
      - DASHBOARD_HOST=dashboard-us
      - OBSERVE_ONLY=${OBSERVE_ONLY:-false}
      # Churn cap. Live US logs: one symbol entered 10x in a single day; 174
      # round trips on a $49 account = 54x turnover, where friction ($5.95)
      # exceeded the entire gross loss ($3.79). A cap of 2 blocks 26% of BUYs.
      # US keeps ALLOW_OVERNIGHT_HOLD unset — see the IN block for why.
      - MAX_ENTRIES_PER_SYMBOL_PER_DAY=${US_MAX_ENTRIES_PER_SYMBOL:-2}

  orchestrator-us:
    <<: *agent-base
    container_name: us-orchestrator
    command: ["python", "-m", "agents.orchestrator"]
    environment:
      - TRADING_MARKET=US
      - REDIS_URL=redis://redis:6379/0
      - HC_AGENT=orchestrator
      - TZ=America/New_York
      - CONTAINER_TRADER=us-trading-agent
      - CONTAINER_SCANNER=us-scanner
      - CONTAINER_VETTING=us-vetting
      - CONTAINER_STRATEGY=us-strategy
      - CONTAINER_TRAINER=us-trainer
    volumes:
      - ./:/app
      - ./logs:/app/logs
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock

  scanner-us:
    <<: *agent-base
    container_name: us-scanner
    command: ["python", "-m", "agents.scanner"]
    environment:
      - TRADING_MARKET=US
      - REDIS_URL=redis://redis:6379/0
      - HC_AGENT=scanner
      - EOD_API_KEY=${EOD_API_KEY}
      - TZ=America/New_York

  vetting-us:
    <<: *agent-base
    container_name: us-vetting
    command: ["python", "-m", "agents.vetting"]
    environment:
      - TRADING_MARKET=US
      - REDIS_URL=redis://redis:6379/0
      - HC_AGENT=vetting
      - TZ=America/New_York
      # US market data (backtest replay + per-stock hybrid thresholds) comes from
      # Alpaca — unlike IN/yfinance there is no keyless route, so this agent needs
      # read-only Alpaca data keys or every US fetch fails and it approves blindly.
      - APCA_API_KEY_ID=${APCA_API_KEY_ID}
      - APCA_API_SECRET_KEY=${APCA_API_SECRET_KEY}
      # Match the live trader's entry path so the backtest screen tests the
      # ML-driven strategy that actually trades, not the classic trend path.
      - AI_VALIDATION_ENABLED=${AI_VALIDATION_ENABLED:-true}
      - AI_PRIMARY_DRIVER=${AI_PRIMARY_DRIVER:-true}

  strategy-us:
    <<: *agent-base
    container_name: us-strategy
    command: ["python", "-m", "agents.strategy"]
    environment:
      - TRADING_MARKET=US
      - REDIS_URL=redis://redis:6379/0
      - HC_AGENT=strategy
      - TZ=America/New_York
      # SPY index data comes from Alpaca for US (no keyless route); without keys
      # the regime classifier gets "No index data" and never publishes a regime.
      - APCA_API_KEY_ID=${APCA_API_KEY_ID}
      - APCA_API_SECRET_KEY=${APCA_API_SECRET_KEY}

  trainer-us:
    <<: *agent-base
    container_name: us-trainer
    command: ["python", "-m", "agents.trainer"]
    environment:
      - TRADING_MARKET=US
      - REDIS_URL=redis://redis:6379/0
      - HC_AGENT=trainer
      - EOD_API_KEY=${EOD_API_KEY}
      - TZ=America/New_York

  # =========================================================================
  # Dashboards (unchanged)
  # =========================================================================

  dashboard-us:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: us-trading-dashboard
    ports:
      - "3001:3000"
    environment:
      - DASHBOARD_USERNAME=${DASHBOARD_USERNAME:-}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-}
      - TRADES_CSV_PATH=/data/trades_US.csv
      - AGENT_LOG_PATH=/logs/agent_US.log
      - MARKET_TYPE=US
      - TRADING_MODE=${TRADING_MODE:-paper}
      - TRADING_DB_PATH=/data/trading_US.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./logs:/logs
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  dashboard-in:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: in-trading-dashboard
    ports:
      - "3002:3000"
    environment:
      - DASHBOARD_USERNAME=${DASHBOARD_USERNAME:-}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-}
      - TRADES_CSV_PATH=/data/trades_IN.csv
      - AGENT_LOG_PATH=/logs/agent_IN.log
      - MARKET_TYPE=IN
      - TRADING_MODE=${TRADING_MODE:-paper}
      - TRADING_DB_PATH=/data/trading_IN.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./logs:/logs
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  redis-data:
